name: 11-inputs
on:
  workflow_dispatch:
    inputs:
      dry-run:
        type: boolean
        default: false
        description: skip deployment
      target:
        type: environment
        description: which environment the workflow will target
      tag:
        type: choice
        options:
          - v1
          - v2
          - v3
        default: v3
        description: release from which to build and deply
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: |
          echo "Building from tag ${{ inputs.tag }}"
          
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.dry-run == false }}
    environment: ${{ inputs.target }}
    steps:
      - name: Deploy
        run: |
          echo " DEploying to $enviorment here"
